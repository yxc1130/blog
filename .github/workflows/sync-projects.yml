name: Sync project showcase

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: project-showcase-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out blog source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Synchronize showcase projects
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run sync-projects

      - name: Verify project synchronizer
        run: node --test test/projects.test.mjs

      - name: Generate site
        run: npm run build

      - name: Commit source updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add source/_data/projects.yml source/projects/index.md
          if git diff --cached --quiet; then
            echo "No project catalog changes."
          else
            git commit -m "chore: sync project showcase"
            git push origin HEAD:master
          fi

      - name: Generate site after source commit
        run: npm run build

      - name: Publish GitHub Pages
        run: npm run deploy
